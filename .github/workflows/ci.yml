name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Kernel Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reads rust-toolchain.toml automatically — picks up the nightly pin,
      # x86_64-unknown-none target, and components declared there.
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false  # Handled by the actions/cache step below

      - name: Install QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-system-x86

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v4
        continue-on-error: true  # Cache failure should never block CI
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --bin qemu-uefi

      - name: Unit tests (lib)
        run: cargo ktest --lib

      - name: Integration test — boot
        run: cargo ktest --test test-boot

      - name: Integration test — should-panic
        run: cargo ktest --test test-should-panic

      - name: Integration test — stack-overflow
        run: cargo ktest --test test-stack-overflow

      - name: Integration test — virtual-address-panic
        run: cargo ktest --test test-virtual-address-panic

